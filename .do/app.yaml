name: numquants-staging
region: fra

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED

vpc:
  id: 9bc59245-98de-4dff-805c-cee86a64f1b6

ingress:
  rules:
  - component:
      name: web
    match:
      path:
        prefix: /

domains:
- domain: staging.numquants.com
  type: PRIMARY

services:
- name: web
  github:
    repo: fayolt/financial-models-streamlit
    branch: main
    deploy_on_push: false   # trigger staging deploys manually
  dockerfile_path: /Dockerfile
  run_command: /app/start.sh
  http_port: 8501
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb

  envs:
  # ── Database ───────────────────────────────────────────────────────────────
  # Value: postgresql://doadmin:<pass>@db-postgresql-financial-models-do-user-31854730-0.k.db.ondigitalocean.com:25060/db-numquants-staging?sslmode=require
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET

  # ── Auth ───────────────────────────────────────────────────────────────────
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
    # ⚠ Use a DIFFERENT secret from prod to isolate staging sessions.
  - key: JWT_ALGORITHM
    scope: RUN_TIME
    value: HS256
  - key: SESSION_TTL_SECONDS
    scope: RUN_TIME
    value: "2592000"

  # ── Paystack ───────────────────────────────────────────────────────────────
  - key: PAYSTACK_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
  - key: PAYSTACK_PUBLIC_KEY
    scope: RUN_TIME
    type: SECRET
  - key: PAYSTACK_BASE_URL
    scope: RUN_TIME
    value: https://api.paystack.co
  - key: PAYSTACK_CALLBACK_URL
    scope: RUN_TIME
    value: https://staging.numquants.com/account

  # ── AI commentary ──────────────────────────────────────────────────────────
  - key: LLM_PROVIDER
    scope: RUN_TIME
    value: openai
  - key: OPENAI_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: OPENAI_MODEL
    scope: RUN_TIME
    value: gpt-4o-mini
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ANTHROPIC_MODEL
    scope: RUN_TIME
    value: claude-sonnet-4-6

  # ── Email ──────────────────────────────────────────────────────────────────
  - key: MAILGUN_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: MAILGUN_DOMAIN
    scope: RUN_TIME
    value: numquants.com
  - key: MAILGUN_API_BASE
    scope: RUN_TIME
    value: https://api.mailgun.net
  - key: MAIL_FROM
    scope: RUN_TIME
    value: "Numquants Staging <no.reply@numquants.com>"

  # ── App ────────────────────────────────────────────────────────────────────
  - key: APP_BASE_URL
    scope: RUN_TIME
    value: https://staging.numquants.com
