name: numquants-production
region: fra

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED

vpc:
  id: 9bc59245-98de-4dff-805c-cee86a64f1b6

databases:
- cluster_name: db-postgresql-financial-models-prod
  db_name: db-numquants-prod
  db_user: numquants_prod
  engine: PG
  name: db-postgresql-financial-models-prod
  production: true

# More-specific prefix must come first.
# preserve_path_prefix keeps /api/* intact when forwarding to FastAPI.
ingress:
  rules:
  - component:
      name: api
      preserve_path_prefix: true
    match:
      path:
        prefix: /api
  - component:
      name: web
    match:
      path:
        prefix: /

domains:
- domain: numquants.com
  type: PRIMARY
- domain: www.numquants.com
  type: ALIAS

services:
- name: web
  github:
    repo: fayolt/financial-models-streamlit
    branch: main
    deploy_on_push: false   # trigger production deploys manually
  dockerfile_path: /Dockerfile
  run_command: /app/start.sh
  http_port: 8501
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-2gb   # double staging for headroom
  health_check:
    http_path: /_stcore/health

  envs:
  # ── Environment ────────────────────────────────────────────────────────────
  - key: APP_ENV
    scope: RUN_AND_BUILD_TIME
    value: production

  # ── Database ───────────────────────────────────────────────────────────────
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: ${db-postgresql-financial-models-prod.DATABASE_URL}

  # ── Auth ───────────────────────────────────────────────────────────────────
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: JWT_ALGORITHM
    scope: RUN_TIME
    value: HS256
  - key: SESSION_TTL_SECONDS
    scope: RUN_TIME
    value: "2592000"

  # ── Paystack ───────────────────────────────────────────────────────────────
  - key: PAYSTACK_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
  - key: PAYSTACK_PUBLIC_KEY
    scope: RUN_TIME
    type: SECRET
  - key: PAYSTACK_BASE_URL
    scope: RUN_TIME
    value: https://api.paystack.co
  - key: PAYSTACK_CALLBACK_URL
    scope: RUN_TIME
    value: https://numquants.com/account

  # ── AI commentary ──────────────────────────────────────────────────────────
  - key: LLM_PROVIDER
    scope: RUN_TIME
    value: openai
  - key: OPENAI_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: OPENAI_MODEL
    scope: RUN_TIME
    value: gpt-4o-mini
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ANTHROPIC_MODEL
    scope: RUN_TIME
    value: claude-sonnet-4-6

  # ── Email ──────────────────────────────────────────────────────────────────
  - key: MAILGUN_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: MAILGUN_DOMAIN
    scope: RUN_TIME
    value: numquants.com
  - key: MAILGUN_API_BASE
    scope: RUN_TIME
    value: https://api.mailgun.net
  - key: MAIL_FROM
    scope: RUN_TIME
    value: "Numquants <no.reply@numquants.com>"

  # ── App ────────────────────────────────────────────────────────────────────
  - key: APP_BASE_URL
    scope: RUN_TIME
    value: https://numquants.com

  # ── Datadog ────────────────────────────────────────────────────────────────
  - key: DD_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DD_SITE
    scope: RUN_TIME
    value: datadoghq.com
  - key: DD_ENV
    scope: RUN_TIME
    value: production
  - key: DD_SERVICE
    scope: RUN_TIME
    value: numquants-web
  - key: DD_VERSION
    scope: RUN_TIME
    value: "0.1.0"

# FastAPI sidecar — same image, different run_command + port.
- name: api
  github:
    repo: fayolt/financial-models-streamlit
    branch: main
    deploy_on_push: false
  dockerfile_path: /Dockerfile
  run_command: uvicorn api.main:app --host 0.0.0.0 --port 8000
  http_port: 8000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  health_check:
    http_path: /api/health

  envs:
  - key: APP_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: ${db-postgresql-financial-models-prod.DATABASE_URL}
  - key: PAYSTACK_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DD_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DD_SITE
    scope: RUN_TIME
    value: datadoghq.com
  - key: DD_ENV
    scope: RUN_TIME
    value: production
  - key: DD_SERVICE
    scope: RUN_TIME
    value: numquants-api
  - key: DD_VERSION
    scope: RUN_TIME
    value: "0.1.0"
