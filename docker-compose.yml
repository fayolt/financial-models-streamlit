services:
  db:
    image: postgres:16-alpine
    container_name: numquants_db
    environment:
      POSTGRES_USER: numquants
      POSTGRES_PASSWORD: numquants_dev
      POSTGRES_DB: numquants
    ports:
      - "5433:5432"  # 5433 to avoid conflicts with a system postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numquants -d numquants"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
