# Empty stub so st.secrets.get(...) works in submodules.
#
# We deliberately store no real secrets here — those come from env vars
# injected at deploy time (.do/app.yaml + scripts/deploy-staging.sh).
#
# Streamlit raises "No secrets found" the moment any code touches st.secrets
# if no secrets.toml exists in any of its search paths. The solar-farm
# submodule calls st.secrets.get(key, "") to pick up optional LLM keys, and
# even a `.get` with a default triggers the error. This empty file silences it.
